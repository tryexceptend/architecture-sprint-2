name: sharding-repl-cache
services:

  mongo_config:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo_config
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.10
    volumes:
      - config-data-db:/data/db
      - config-data-config:/data/configdb
    command:
      [
        "--configsvr",
        "--replSet",
        "config_server",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard1-a:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo_shard1-a
    restart: always
    ports:
      - "27018:27018"
    networks:
      app-network:
        ipv4_address: 173.17.0.11
    volumes:
      - shard1-a-data-db:/data/db
      - shard1-a-data-config:/data/configdb
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard1",
        "--bind_ip_all",
        "--port",
        "27018"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard1-b:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo_shard1-b
    restart: always
    ports:
      - "27019:27019"
    networks:
      app-network:
        ipv4_address: 173.17.0.13
    volumes:
      - shard1-b-data-db:/data/db
      - shard1-b-data-config:/data/configdb
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard1",
        "--bind_ip_all",
        "--port",
        "27019"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard1-c:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo_shard1-c
    restart: always
    ports:
      - "27020:27020"
    networks:
      app-network:
        ipv4_address: 173.17.0.14
    volumes:
      - shard1-c-data-db:/data/db
      - shard1-c-data-config:/data/configdb
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard1",
        "--bind_ip_all",
        "--port",
        "27020"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard2-a:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo_shard2-a
    restart: always
    ports:
      - "27021:27021"
    networks:
      app-network:
        ipv4_address: 173.17.0.15
    volumes:
      - shard2-a-data-db:/data/db
      - shard2-a-data-config:/data/configdb
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard2",
        "--bind_ip_all",
        "--port",
        "27021"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard2-b:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo_shard2-b
    restart: always
    ports:
      - "27022:27022"
    networks:
      app-network:
        ipv4_address: 173.17.0.16
    volumes:
      - shard2-b-data-db:/data/db
      - shard2-b-data-config:/data/configdb
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard2",
        "--bind_ip_all",
        "--port",
        "27022"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard2-c:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo_shard2-c
    restart: always
    ports:
      - "27023:27023"
    networks:
      app-network:
        ipv4_address: 173.17.0.17
    volumes:
      - shard2-c-data-db:/data/db
      - shard2-c-data-config:/data/configdb
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard2",
        "--bind_ip_all",
        "--port",
        "27023"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
      
  mongo_router:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo_router
    volumes:
      - router-data-db:/data/db
      - router-data-config:/data/configdb
    restart: always
    ports:
      - "27024:27024"
    networks:
      app-network:
        ipv4_address: 173.17.0.7
    command:
      [
        "mongos",
        "--configdb",
        "config_server/mongo_config:27017",
        "--bind_ip_all",
        "--port",
        "27024"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  redis_cache:
    image: redis:latest
    container_name: redis_cache
    ports:
      - "6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    networks:
      app-network:
        ipv4_address: 173.17.0.2

  pymongo_api:
    container_name: pymongo_api
    build: 
      context: api_app
      dockerfile: Dockerfile
    image: kazhem/pymongo_api:1.0.0
    depends_on:
      - mongo_router
    ports:
      - 8080:8080
    networks:
      app-network:
        ipv4_address: 173.17.0.6
    environment:
      MONGODB_URL: "mongodb://mongo_router:27024/"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis_cache:6379" 

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 173.17.0.0/17

volumes:
  config-data-db:
  config-data-config:
  
  shard1-a-data-db:
  shard1-a-data-config:
  
  shard1-b-data-db:
  shard1-b-data-config:
  
  shard1-c-data-db:
  shard1-c-data-config:
  
  shard2-a-data-db:
  shard2-a-data-config:
  
  shard2-b-data-db:
  shard2-b-data-config:
  
  shard2-c-data-db:
  shard2-c-data-config:
  
  router-data-db:
  router-data-config:
  
  redis_data:
  